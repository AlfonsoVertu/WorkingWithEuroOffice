name: "Elasticsearch (WWW)"
slug: "elasticsearch"
description: "Elasticsearch for Home Assistant"
version: "8.12.2"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
map:
  - share:rw
  - config:rw
options:
  heap_size: 1g
schema:
  heap_size: str
image: "ghcr.io/alfonsovertu/elasticsearch-{arch}"
ports:
  9200/tcp: 9200
  9300/tcp: 9300

